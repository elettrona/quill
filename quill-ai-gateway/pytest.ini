[pytest]
# Anchors pytest's rootdir to this directory (rather than walking up to
# the parent QUILL repo's pyproject.toml) and isolates this package's
# "tests" module from the parent repo's own "tests" package of the same
# name -- both exist side by side (this is a sibling service, like
# quillin-hub/), and without --import-mode=importlib Python's import
# system can cache the wrong one first.
addopts = --import-mode=importlib
testpaths = tests
