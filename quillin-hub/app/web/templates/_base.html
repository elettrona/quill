<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quillin Hub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* High contrast and focus indicators for WCAG 2.2 AA */
        :focus {
            outline: 3px solid #2563eb !important;
            outline-offset: 2px !important;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <!-- Skip to Content link for keyboard users -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white p-2 rounded z-50">
        Skip to main content
    </a>

    <header class="bg-white border-b border-slate-200 px-6 py-4" role="banner">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-blue-700"><a href="/">Quillin Hub</a></h1>

            <nav aria-label="Primary" class="flex gap-4 items-center">
                <a href="/" class="text-slate-700 hover:text-blue-700 underline">Browse</a>
                <a href="/forge/" class="text-slate-700 hover:text-blue-700 underline">Share your work</a>
                <a href="/forge/submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Submit an artifact</a>
            </nav>

            <!-- Search Region -->
            <form action="/search" method="GET" role="search" class="relative w-full md:w-auto">
                <label for="search-input" class="sr-only">Search the Hub</label>
                <div class="flex gap-2">
                    <input type="text" id="search-input" name="q" value="{{ query or '' }}"
                           placeholder="Search the Hub..."
                           class="border border-slate-300 rounded-lg px-4 py-2 w-full md:w-64 focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto px-6 py-8" role="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-100 border-t border-slate-200 px-6 py-8 mt-12" role="contentinfo">
        <div class="max-w-7xl mx-auto text-center text-slate-500 text-sm">
            <p>&copy; 2026 Community Access. Built with accessibility at the core.</p>
        </div>
    </footer>
</body>
</html>
