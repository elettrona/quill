name: Accessibility CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  accessibility-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ui]
      - name: Verify docs artifacts are regenerated
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          if (-not $base) { $base = "${{ github.event.before }}" }
          if (-not $base -or $base -eq "0000000000000000000000000000000000000000") {
            Write-Host "Skipping docs artifact diff check (base ref unavailable)."
          } else {
            python scripts/check_docs_artifacts.py --base-ref $base --head-ref "${{ github.sha }}"
          }
      - name: Run accessibility suite
        run: |
          pytest -q tests\accessibility tests\unit\platform\windows
      - name: Run dialog accessibility regressions
        run: |
          pytest -q tests\unit\ui\test_dialog_contract.py tests\unit\ui\test_assistant_tools_dialog_callbacks.py tests\unit\ui\test_ui_palette_dialog.py tests\unit\ui\test_main_frame_navigation.py -k "dialog_contract or use_prompt or escape_is_not_manually_intercepted or prompt_search_defers_focus_and_uses_modal_ids or show_notifications_dialog_uses_close_for_affirmative_and_escape"
