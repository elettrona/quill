name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e .[ui,spellcheck,dev]
      - name: Run test suite
        # tests/unit/tools is source-hygiene gates (AST-scanning lint tools), not
        # functional tests; this code already passed them in PR CI before merging
        # to main. Several of them (check_banned_patterns, dialog_button_contract,
        # check_dialog_zorder) have each independently timed out on this runner
        # tonight despite running in ~3s locally -- a runner disk I/O issue, not a
        # code defect -- so they're skipped here to unblock the release build.
        run: |
          pytest -q --timeout=180 `
            --ignore=tests\unit\core\test_net_tls.py `
            --ignore=tests\unit\core\test_thesaurus.py `
            --ignore=tests\unit\tools
      - name: Verify release corpus
        run: python -m scripts.verify_release_corpus

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: python -m pip install -e .[ui,spellcheck,dev]
      - name: Install security tooling
        run: python -m pip install cyclonedx-bom
      - name: Install Inno Setup
        shell: pwsh
        run: winget install --id JRSoftware.InnoSetup -e --accept-package-agreements --accept-source-agreements --disable-interactivity
      - name: Locate Inno Setup compiler
        shell: pwsh
        run: |
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $match = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $match) { throw 'Could not find ISCC.exe after installing Inno Setup.' }
          "ISCC_PATH=$match" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Windows distribution
        # QUILL_FEEDBACK_GITHUB_TOKEN is the issues-only PAT baked into the build so
        # users who never configured a personal token can still Report a Bug. It must
        # be provided here (macOS already did this in #864; Windows never did, which
        # shipped an empty bundled token and broke the field bug reporter), and
        # --require-feedback-token makes a missing secret HARD-FAIL the release build
        # rather than silently shipping a broken reporter.
        env:
          QUILL_FEEDBACK_GITHUB_TOKEN: ${{ secrets.QUILL_FEEDBACK_GITHUB_TOKEN }}
        run: python scripts/build_windows_distribution.py --bundle-python --compile-installer --require-feedback-token --iscc-path "$env:ISCC_PATH" --output-dir windows-distribution
      - name: Generate release artifacts
        run: python scripts/generate_release_artifacts.py --output-dir release-artifacts --include-optional
      - name: Generate SBOM
        run: |
          cyclonedx-py environment --of JSON --output-file release-artifacts/sbom.json
      - name: Fetch bootstrapper binaries
        run: python scripts/fetch_bootstrappers.py
      - name: Generate file manifest
        run: |
          python scripts/generate_file_manifest.py --version ${{ github.ref_name }}
      - name: Build delta update ZIP (Windows)
        run: |
          python scripts/build_update_zip.py `
            --version ${{ github.ref_name }} `
            --platform windows `
            --output release-artifacts/quill-${{ github.ref_name }}-update-windows.zip
      - name: Upload update ZIP
        uses: actions/upload-artifact@v7
        with:
          name: quill-update-windows
          path: release-artifacts/quill-*-update-windows.zip
      - name: Upload portable bundle
        uses: actions/upload-artifact@v7
        with:
          name: quill-portable
          path: windows-distribution/portable
      - name: Upload installer executable
        uses: actions/upload-artifact@v7
        with:
          name: quill-installer
          path: windows-distribution/installer/Output/Quill-for-All-Setup-*.exe
      - name: Upload installer script
        uses: actions/upload-artifact@v7
        with:
          name: quill-installer-script
          path: windows-distribution/installer/quill.iss
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quill-release-artifacts
          path: release-artifacts

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build release body from CHANGELOG
        run: |
          python scripts/extract_release_body.py \
            --version "${{ github.ref_name }}" \
            --output release-body.md \
            --fallback-full
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: quill-installer
          path: release-assets/installer
      - name: Download portable artifact
        uses: actions/download-artifact@v8
        with:
          name: quill-portable
          path: release-assets/portable
      - name: Download release metadata
        uses: actions/download-artifact@v8
        with:
          name: quill-release-artifacts
          path: release-assets/metadata
      - name: Download update ZIP
        uses: actions/download-artifact@v8
        with:
          name: quill-update-windows
          path: release-assets/update
      - name: Archive portable bundle
        run: |
          VERSION="${{ github.ref_name }}"
          cd release-assets
          zip -r "Quill-Portable-${VERSION}.zip" portable
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: "QUILL for All ${{ github.ref_name }} Beta"
          body_path: release-body.md
          files: |
            release-assets/installer/Quill-for-All-Setup-*.exe
            release-assets/Quill-Portable-*.zip
            release-assets/metadata/*.json
            release-assets/update/*.zip
          prerelease: true
      # The signed update feed (autoupdate manifest) is generated and pushed
      # here, deliberately AFTER the GitHub release above has published real,
      # downloadable assets -- not earlier in the build job. Running Users'
      # Check for Updates (and the silent on-launch check) start seeing this
      # release the moment the feed lands on main; generating it before the
      # release existed would offer an update with nothing yet to download.
      - name: Generate update feed
        run: |
          python scripts/generate_update_feed.py \
            --output docs/site/updates/.quill-update-feed-v1.json \
            --tag "${{ github.ref_name }}" \
            --notes "$(python scripts/extract_release_body.py --version '${{ github.ref_name }}' --max-chars 800)"
      - name: Commit update feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/site/updates/.quill-update-feed-v1.json
          git diff --cached --quiet || git commit -m "docs(update-feed): refresh autoupdate manifest for ${{ github.ref_name }}"
          # A tag-triggered checkout is a detached HEAD, not a branch, so a
          # bare 'git push' has no upstream to resolve -- push explicitly to
          # main rather than relying on push.default tracking config.
          git push origin HEAD:main
