name: PR CI

# GATE-2: the required pull-request pipeline. This workflow runs the lint, test,
# coverage-floor, and characterization jobs. Scoped strict typing, the
# banned-pattern gate, and the no-silent-network audit run in Security CI;
# the accessibility suite and docs-artifact check run in Accessibility CI.
# Branch protection should require all of these checks before merge.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  workflow-lint:
    # Statically validate every GitHub Actions workflow: YAML structure, action
    # input contracts, and — crucially — shell-injection patterns such as
    # interpolating an untrusted ${{ github.head_ref }} directly into an inline
    # script. Catches workflow regressions automatically instead of relying on a
    # manual local actionlint run. Pinned to a specific image for reproducibility.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint workflows with actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Check formatting
        run: |
          ruff format --check .
      - name: Lint
        # CQ-18 complete: line-length (E501) is now clean across first-party
        # source, so the full rule set is enforced with no exclusions. The only
        # remaining E501 exceptions are deliberate per-file ignores (installer
        # script literals) declared in pyproject.toml.
        run: |
          ruff check .

  unit-tests:
    # GATE-5: the full suite must pass and coverage of quill/core and quill/io
    # may not fall below the floor. Raise the floor as coverage improves; never
    # lower it.
    runs-on: windows-latest
    # A healthy full run finishes in ~15 minutes (install + suite). Two runs
    # on 2026-07-14 sat "in progress" for an hour with the log frozen at the
    # same 93% point -- a deterministic test hang. The job-level ceiling makes
    # a hang cost 30 minutes instead of GitHub's 6-hour default, and the
    # per-test --timeout below makes the hanging test name itself.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ui]
      - name: Run unit and accessibility tests
        # -n 4 --dist=loadfile: the single-process run was silently
        # accumulating native Windows window-creation resources across the
        # suite's ~8700+ tests (dozens of test files each construct their own
        # wx.App/wx.Dialog) until dialog construction started failing outright
        # late in the run ("Failed to create dialog. Incorrect DLGTEMPLATE?"),
        # unrelated to any actual code regression -- confirmed by bisection:
        # the same tests pass individually and in any smaller batch, and fail
        # only once enough of the suite has run first in the same process.
        # loadfile keeps each file's tests together in one worker so
        # module-scoped wx_app fixtures still work, while spreading files
        # across 4 separate worker processes so no single process accumulates
        # enough to hit the ceiling.
        # --timeout=300 --timeout-method=thread: no legitimate test in this
        # suite takes anywhere near 5 minutes, so a test that does is hung
        # (e.g. blocked on a credential prompt or an unclosed pipe that only
        # exists on a runner). The thread method works on Windows and dumps
        # every thread's stack when it fires, so the log names the exact test
        # and blocked line instead of freezing silently.
        #
        # test_dialog_inventory.py runs in its own step below: its full-package
        # AST scans are the suite's single biggest allocation burst, and running
        # that burst late inside a worker process already carrying thousands of
        # wx tests' native leftovers crashed the worker outright on 2/2 CI runs
        # on 2026-07-14 (same test, different workers, then the xdist scheduler
        # deadlocked on the dead worker). In a fresh process it is fast and
        # boring.
        run: |
          pytest tests\unit tests\accessibility -q -n 4 --dist=loadfile `
            --timeout=300 --timeout-method=thread `
            --ignore=tests\unit\core\test_net_tls.py `
            --ignore=tests\unit\core\test_thesaurus.py `
            --ignore=tests\unit\ui\test_dialog_inventory.py `
            --cov=quill.core --cov=quill.io `
            --cov-report=
      - name: Run dialog-inventory gate tests (isolated process)
        run: |
          pytest tests\unit\ui\test_dialog_inventory.py -q `
            --timeout=300 --timeout-method=thread -p no:cacheprovider
      - name: Enforce coverage floor
        # A separate step reading the persisted .coverage data, decoupled
        # from the xdist test-runner process above -- if that process exits
        # in some unusual way, the coverage floor is still checked from what
        # was actually recorded rather than silently skipped.
        run: |
          coverage report --skip-covered --show-missing --fail-under=70

  characterization:
    # GATE-6: the MainFrame public surface is frozen so decomposition stays
    # behavior-preserving. Regenerate the snapshot deliberately with
    # 'python -m quill.tools.ui_surface --write' when the surface changes.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Verify MainFrame characterization snapshot
        run: |
          pytest -q tests\unit\ui\test_main_frame_characterization.py

  internal-gates:
    # GATE-4/GATE-11/publishing-provider/check_feature_tags/check_translation/check_help_coverage:
    # run every internal CI gate that the pre-commit hooks enforce locally so
    # PRs from forks (which bypass pre-commit) are still caught in CI.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Banned-pattern gate (GATE-4)
        run: python -m quill.tools.check_banned_patterns
      - name: Module-size budget (GATE-11)
        run: python -m quill.tools.module_size_budget
      - name: Error-code completeness gate (GATE-EC)
        run: python -m quill.tools.error_code_audit
      - name: Publishing provider registry gate
        run: python -m quill.tools.check_publishing_providers
      - name: Feature-tag gate
        run: python -m quill.tools.check_feature_tags
      - name: Translation gate
        run: python -m quill.tools.check_translation
      - name: Help-coverage gate
        run: python -m quill.tools.check_help_coverage
      - name: Internal-gate unit tests
        run: |
          pytest -q `
            tests\unit\tools\test_check_banned_patterns.py `
            tests\unit\tools\test_check_publishing_providers.py `
            tests\unit\tools\test_feature_tags.py `
            tests\unit\tools\test_translation.py `
            tests\unit\tools\test_help_coverage.py `
            tests\unit\tools\test_error_code_audit.py

  performance-budgets:
    # PERF-9: enforce hard ceilings on the startup-critical paths (startup
    # lexical warm-up, first spell check, first thesaurus lookup, and Quick Nav
    # prewarm). A material regression on any of these fails the build. Never
    # raise a budget to hide a regression -- fix the regression instead.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run performance budget suite
        run: |
          pytest -q tests\performance

